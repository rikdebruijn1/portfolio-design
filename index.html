<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Process | Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .video-container {
            width: 75%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .portfolio-button {
            /* De marge is hier verlaagd voor een hogere positie */
            margin-top: 30px; 
            padding: 16px 32px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            transition: opacity 0.5s ease, background-color 0.3s ease;
            
            /* Onzichtbaar bij laden */
            opacity: 0;
            pointer-events: none; 
        }

        .portfolio-button.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .portfolio-button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            id="vimeo-player"
            src="https://vimeo.com/1183534904?share=copy&fl=sv&fe=ci#t=0" 
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

    <a href="portfolio2026v3.pdf" target="_blank" rel="noopener noreferrer" class="portfolio-button" id="portfolio-btn">
        View Portfolio
    </a>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        var iframe = document.querySelector('#vimeo-player');
        var player = new Vimeo.Player(iframe);
        var btn = document.querySelector('#portfolio-btn');

        // De knop verschijnt zodra de video begint te spelen
        player.on('play', function() {
            btn.classList.add('visible');
        });
    </script>

</body>
</html>
