<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Viewer | Rik de Bruijn</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Zorgt dat de browser zelf niet scrolt, maar de PDF-viewer wel */
            background-color: #333;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="portfolio.pdf#toolbar=0" type="application/pdf"></iframe>
</body>
</html>
