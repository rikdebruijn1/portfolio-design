<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Viewer | Rik de Bruijn</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #333;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        .mobile-fallback {
            display: none;
            color: white;
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        /* Als het iframe niet werkt of op kleine schermen */
        @media only screen and (max-width: 768px) {
            iframe { display: none; }
            .mobile-fallback { display: block; }
        }
    </style>
</head>
<body>
    <iframe src="Portfolio_RikdeBruijn.pdf#toolbar=0" type="application/pdf">
        <p>Your browser does not support iframes. 
        <a href="Portfolio_RikdeBruijn.pdf">Click here to view the PDF.</a></p>
    </iframe>

    <div class="mobile-fallback">
        <p>De PDF-viewer werkt niet optimaal op mobiel.</p>
        <a href="Portfolio_RikdeBruijn.pdf" style="color: #fff; text-decoration: underline;">Klik hier om het portfolio direct te openen.</a>
    </div>
</body>
</html>
